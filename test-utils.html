<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeUtils Test</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 800px;
        margin: 20px auto;
        padding: 20px;
      }
      .test-section {
        margin: 20px 0;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
      }
      .result {
        background: #f5f5f5;
        padding: 10px;
        margin: 10px 0;
        border-radius: 3px;
      }
      button {
        padding: 10px 20px;
        margin: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>TimeUtils 機能テスト</h1>

    <div class="test-section">
      <h2>1. NTP時刻取得テスト</h2>
      <button onclick="testNTP()">NTP時刻を取得</button>
      <div id="ntp-result" class="result"></div>
    </div>

    <div class="test-section">
      <h2>2. 祝日判定テスト</h2>
      <button onclick="testHoliday('2025-01-01')">2025-01-01（元日）</button>
      <button onclick="testHoliday('2025-01-13')">2025-01-13（成人の日）</button>
      <button onclick="testHoliday('2025-01-15')">2025-01-15（平日）</button>
      <div id="holiday-result" class="result"></div>
    </div>

    <div class="test-section">
      <h2>3. 曜日区分判定テスト</h2>
      <button onclick="testWeekdayType('2025-01-13')">
        2025-01-13（月・祝日）
      </button>
      <button onclick="testWeekdayType('2025-01-14')">
        2025-01-14（火・平日）
      </button>
      <button onclick="testWeekdayType('2025-01-18')">
        2025-01-18（土）
      </button>
      <div id="weekday-result" class="result"></div>
    </div>

    <div class="test-section">
      <h2>4. 時刻フォーマットテスト</h2>
      <button onclick="testFormatTime()">時刻フォーマット</button>
      <div id="format-result" class="result"></div>
    </div>

    <div class="test-section">
      <h2>5. 所要時間計算テスト</h2>
      <button onclick="testDuration()">所要時間計算</button>
      <div id="duration-result" class="result"></div>
    </div>

    <script src="js/utils.js"></script>
    <script>
      async function testNTP() {
        const resultDiv = document.getElementById('ntp-result');
        resultDiv.textContent = '取得中...';

        try {
          const ntpTime = await timeUtils.getCurrentTimeFromNTP();
          const localTime = timeUtils.getCurrentTimeLocal();

          resultDiv.innerHTML = `
            <strong>NTP時刻:</strong> ${ntpTime.toLocaleString('ja-JP')}<br>
            <strong>ローカル時刻:</strong> ${localTime.toLocaleString('ja-JP')}<br>
            <strong>差分:</strong> ${Math.abs(ntpTime - localTime)}ミリ秒
          `;
        } catch (error) {
          resultDiv.textContent = `エラー: ${error.message}`;
        }
      }

      async function testHoliday(dateStr) {
        const resultDiv = document.getElementById('holiday-result');
        resultDiv.textContent = '判定中...';

        try {
          const date = new Date(dateStr);
          const isHoliday = await timeUtils.isHoliday(date);

          resultDiv.innerHTML = `
            <strong>${dateStr}:</strong> ${isHoliday ? '祝日です' : '祝日ではありません'}
          `;
        } catch (error) {
          resultDiv.textContent = `エラー: ${error.message}`;
        }
      }

      async function testWeekdayType(dateStr) {
        const resultDiv = document.getElementById('weekday-result');
        resultDiv.textContent = '判定中...';

        try {
          const date = new Date(dateStr);
          const weekdayType = await timeUtils.getWeekdayType(date);
          const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
          const dayOfWeek = dayNames[date.getDay()];

          resultDiv.innerHTML = `
            <strong>${dateStr} (${dayOfWeek}):</strong> ${weekdayType}
          `;
        } catch (error) {
          resultDiv.textContent = `エラー: ${error.message}`;
        }
      }

      function testFormatTime() {
        const resultDiv = document.getElementById('format-result');

        const tests = [
          { hour: 9, minute: 5 },
          { hour: 18, minute: 50 },
          { hour: 0, minute: 0 },
          { hour: 23, minute: 59 },
        ];

        let html = '';
        tests.forEach((test) => {
          const formatted = timeUtils.formatTime(test.hour, test.minute);
          html += `${test.hour}時${test.minute}分 → <strong>${formatted}</strong><br>`;
        });

        resultDiv.innerHTML = html;
      }

      function testDuration() {
        const resultDiv = document.getElementById('duration-result');

        const tests = [
          { start: [9, 0], end: [9, 30], expected: 30 },
          { start: [18, 50], end: [19, 20], expected: 30 },
          { start: [23, 45], end: [0, 15], expected: -1410 }, // 日をまたぐケース
        ];

        let html = '';
        tests.forEach((test) => {
          const duration = timeUtils.calculateDuration(
            test.start[0],
            test.start[1],
            test.end[0],
            test.end[1]
          );
          const startTime = timeUtils.formatTime(test.start[0], test.start[1]);
          const endTime = timeUtils.formatTime(test.end[0], test.end[1]);
          html += `${startTime} → ${endTime}: <strong>${duration}分</strong><br>`;
        });

        resultDiv.innerHTML = html;
      }
    </script>
  </body>
</html>
