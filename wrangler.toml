name = "saga-bus-navigator"
pages_build_output_dir = "."
compatibility_date = "2025-11-16"
compatibility_flags = ["nodejs_compat"]

# GTFS data storage
[[kv_namespaces]]
binding = "GTFS_DATA"
id = "3ae3f515d413458d913a9be942fdf056"

# MCP Apps rate limiting
# Note: Create this KV namespace with: wrangler kv:namespace create "RATE_LIMIT_KV"
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "YOUR_RATE_LIMIT_KV_ID_HERE"

