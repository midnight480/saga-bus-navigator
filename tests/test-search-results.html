<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>検索結果表示テスト</title>
  <link rel="stylesheet" href="../css/app.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="header-title">検索結果表示テスト</h1>
    </header>

    <main class="main">
      <section class="results-section">
        <h2 class="section-title">検索結果</h2>
        
        <!-- Loading Indicator -->
        <div id="loading" class="loading" style="display: none;">
          <div class="loading-spinner"></div>
          <p class="loading-text">検索中...</p>
        </div>
        
        <!-- Results Container -->
        <div id="results-container" class="results-container">
          <p class="results-placeholder">検索条件を入力して検索ボタンを押してください</p>
        </div>
        
        <!-- Load More Button -->
        <button id="load-more" class="btn btn-secondary" style="display: none;">
          もっと見る
        </button>
      </section>

      <section class="search-section">
        <h2 class="section-title">テストコントロール</h2>
        <button id="test-results" class="btn btn-primary">検索結果を表示</button>
        <button id="test-no-results" class="btn btn-primary" style="margin-top: 1rem;">検索結果0件を表示</button>
        <button id="test-loading" class="btn btn-primary" style="margin-top: 1rem;">ローディング表示</button>
      </section>
    </main>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/data-loader.js"></script>
  <script src="../js/app.js"></script>
  <script>
    // テスト用のモックデータ
    const mockResults = [
      {
        tripId: '100',
        routeNumber: '11',
        routeName: '佐賀大学・西与賀線',
        operator: '佐賀市営バス',
        departureStop: '佐賀駅バスセンター',
        arrivalStop: '佐賀大学',
        departureTime: '08:30',
        arrivalTime: '08:50',
        departureHour: 8,
        departureMinute: 30,
        arrivalHour: 8,
        arrivalMinute: 50,
        duration: 20,
        adultFare: 180,
        childFare: 90,
        weekdayType: '平日'
      },
      {
        tripId: '101',
        routeNumber: '11',
        routeName: '佐賀大学・西与賀線',
        operator: '佐賀市営バス',
        departureStop: '佐賀駅バスセンター',
        arrivalStop: '佐賀大学',
        departureTime: '09:00',
        arrivalTime: '09:20',
        departureHour: 9,
        departureMinute: 0,
        arrivalHour: 9,
        arrivalMinute: 20,
        duration: 20,
        adultFare: 180,
        childFare: 90,
        weekdayType: '平日'
      },
      {
        tripId: '102',
        routeNumber: '2',
        routeName: '県庁線',
        operator: '佐賀市営バス',
        departureStop: '佐賀駅バスセンター',
        arrivalStop: '県庁前',
        departureTime: '09:15',
        arrivalTime: '09:25',
        departureHour: 9,
        departureMinute: 15,
        arrivalHour: 9,
        arrivalMinute: 25,
        duration: 10,
        adultFare: 160,
        childFare: 80,
        weekdayType: '平日'
      },
      {
        tripId: '103',
        routeNumber: 'Y-MORAGE',
        routeName: '祐徳稲荷神社線',
        operator: '祐徳バス',
        departureStop: '佐賀駅バスセンター',
        arrivalStop: '祐徳稲荷神社',
        departureTime: '10:00',
        arrivalTime: '10:45',
        departureHour: 10,
        departureMinute: 0,
        arrivalHour: 10,
        arrivalMinute: 45,
        duration: 45,
        adultFare: null,
        childFare: null,
        weekdayType: '平日'
      }
    ];

    // UIControllerのインスタンスを作成
    const uiController = new UIController();

    // テストボタンのイベントリスナー
    document.getElementById('test-results').addEventListener('click', () => {
      uiController.displaySearchResults(mockResults);
    });

    document.getElementById('test-no-results').addEventListener('click', () => {
      uiController.displaySearchResults([]);
    });

    document.getElementById('test-loading').addEventListener('click', () => {
      uiController.displayLoading(true);
      setTimeout(() => {
        uiController.displayLoading(false);
        uiController.displaySearchResults(mockResults);
      }, 2000);
    });
  </script>
</body>
</html>
