<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>データローダーテスト</title>
</head>
<body>
  <h1>データローダーテスト</h1>
  <button id="loadBtn">データを読み込む</button>
  <div id="result"></div>

  <script src="js/data-loader.js"></script>
  <script>
    const resultDiv = document.getElementById('result');
    const loadBtn = document.getElementById('loadBtn');

    loadBtn.addEventListener('click', async () => {
      resultDiv.textContent = '読み込み中...';
      
      try {
        const loader = new DataLoader();
        const startTime = performance.now();
        
        const data = await loader.loadAllData();
        
        const endTime = performance.now();
        const loadTime = (endTime - startTime).toFixed(2);

        let html = `<h2>読み込み成功！（${loadTime}ms）</h2>`;
        html += `<h3>バス停: ${data.busStops.length}件</h3>`;
        html += `<pre>${JSON.stringify(data.busStops.slice(0, 3), null, 2)}</pre>`;
        html += `<h3>時刻表: ${data.timetable.length}件</h3>`;
        html += `<pre>${JSON.stringify(data.timetable.slice(0, 3), null, 2)}</pre>`;
        html += `<h3>運賃: ${data.fares.length}件</h3>`;
        html += `<pre>${JSON.stringify(data.fares.slice(0, 3), null, 2)}</pre>`;

        resultDiv.innerHTML = html;
      } catch (error) {
        resultDiv.innerHTML = `<h2 style="color: red;">エラー</h2><pre>${error.message}</pre>`;
      }
    });
  </script>
</body>
</html>
